<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
     href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
    

</head>

<body>
<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 sidebar">
            <h3 class="text-center mb-4">Dashboard</h3>
            <a href="#"><i class="bi bi-house"></i> Home</a>
            <a href="#"><i class="bi bi-people"></i> Students</a>
            <a href="#"><i class="bi bi-book"></i> Courses</a>
            <a href="#"><i class="bi bi-file-earmark"></i> Exams</a>
            <a href="#"><i class="bi bi-gear"></i> Settings</a>
        </div>

        <!-- Main Content -->

        <div class="col-md-10 p-4">

            <!-- Navbar -->

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>College Admin Dashboard</h2>
                <button class="btn btn-primary">Login</button>
            </div>

            <!-- Statistics Cards -->

            <div class="row g-4">
                <div class="col-md-3 col-sm-6">
                    <div class="card-box bg1">
                        <h4>1200</h4>
                        <p>Total Students</p>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card-box bg2">
                        <h4>75</h4>
                        <p>Total Faculty</p>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card-box bg3">
                        <h4>25</h4>
                        <p>Departments</p>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card-box bg4">
                        <h4>300</h4>
                        <p>Exams Conducted</p>
                    </div>
                </div>
            </div>

            <!-- Table -->

            <div class="mt-5">
                <h4>Recent Students</h4>
                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>101</td>
                            <td>Rahul</td>
                            <td>BCA</td>
                            <td>Active</td>
                        </tr>
                        <tr>
                            <td>102</td>
                            <td>Priya</td>
                            <td>MCA</td>
                            <td>Active</td>
                        </tr>
                        <tr>
                            <td>103</td>
                            <td>Amit</td>
                            <td>BTech</td>
                            <td>Inactive</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
